services:
  # 1. PostgreSQL Database (PIP)
  db:
    image: postgres:15
    container_name: btp_db
    environment:
      POSTGRES_DB: btp
      POSTGRES_USER: NagSigma
      POSTGRES_PASSWORD: NagSigma123
    ports:
      - "5432:5432"
    volumes:
      # Maps your local SQL file to automatically seed your DB
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # 2. Open Policy Agent (PDP)
  opa:
    image: openpolicyagent/opa:latest
    container_name: btp_opa
    ports:
      - "8181:8181"
    volumes:
      # Maps your local 'policies' folder into the OPA container
      - ./policies:/policies
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "/policies/" # 👈 FIXED: Now it loads all your rules, including emergency.rego!

  # 3. Spring Boot Application
  app:
    build: .
    container_name: btp_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/btp
      SPRING_DATASOURCE_USERNAME: NagSigma
      SPRING_DATASOURCE_PASSWORD: NagSigma123
      OPA_URL: http://opa:8181/v1/data/veristas/allow
    depends_on:
      - db
      - opa
    restart: on-failure